
<script>
    // ⚠️ ЗАМЕНИТЕ НА СВОИ КЛЮЧИ FIREBASE
    const firebaseConfig = {
        
    };




        < !DOCTYPE html >
        <html lang="ru">
            <head>
                <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width,initial-scale=1">
                        <title>WhisperVault</title>
                        <style>
                            *{box - sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
                            body{background:#0f172a;color:#f1f5f9;height:100vh;display:flex;flex-direction:column}
                            #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
                            .card{background:#1e293b;padding:24px;border-radius:16px;width:100%;max-width:450px;border:1px solid #334155}
                            h1{text - align:center;margin-bottom:8px}
                            p{text - align:center;color:#94a3b8;margin-bottom:20px;font-size:0.9rem}
                            input{width:100%;padding:12px;margin:8px 0;background:#0b1120;border:1px solid #334155;border-radius:10px;color:#f1f5f9;font-size:1rem}
                            input:focus{outline:none;border-color:#6366f1}
                            .btn{width:100%;padding:12px;margin-top:8px;background:#6366f1;border:none;border-radius:10px;color:white;font-weight:600;cursor:pointer}
                            .btn:hover{background:#4f46e5}.btn:disabled{opacity:0.6}
                            .btn2{background:transparent;border:1px solid #334155;color:#94a3b8}
                            .btn2:hover{color:#f1f5f9;border-color:#6366f1}
                            .btn-create{background:#22c55e}.btn-create:hover{background:#16a34a}
                            .btn-join{background:#f59e0b}.btn-join:hover{background:#d97706}
                            .err{color:#ef4444;text-align:center;margin-top:10px;display:none}
                            .err.show{display:block}
                            #chat{display:none;flex-direction:column;height:100%}
                            .hdr{padding:12px;background:#1e293b;border-bottom:1px solid #334155;display:flex;justify-content:space-between}
                            .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
                            .msg{max - width:85%;padding:10px 14px;border-radius:14px;word-wrap:break-word}
                            .msg.in{align - self:flex-start;background:#334155}.msg.out{align - self:flex-end;background:#6366f1}
                            .meta{font - size:0.75rem;opacity:0.7;margin-bottom:4px}
                            .inp{padding:12px;background:#1e293b;border-top:1px solid #334155;display:flex;gap:8px}
                            #txt{flex:1;padding:12px;border-radius:24px;border:1px solid #334155;background:#0b1120;color:#f1f5f9}
                            .send{width:44px;height:44px;border-radius:50%;background:#6366f1;border:none;color:white;cursor:pointer}
                            .sys{text - align:center;color:#94a3b8;font-size:0.85rem;padding:6px 12px;background:rgba(255,255,255,0.05);border-radius:20px;align-self:center;margin:8px 0}
                            .theme{position:fixed;top:12px;right:12px;background:#1e293b;border:1px solid #334155;border-radius:50%;width:36px;height:36px;cursor:pointer}

                            /* Список комнат */
                            .rooms-list{margin - top:16px;max-height:200px;overflow-y:auto}
                            .room-item{background:#0b1120;border:1px solid #334155;border-radius:10px;padding:12px;margin:8px 0;cursor:pointer;transition:0.2s}
                            .room-item:hover{border - color:#6366f1;background:#1e293b}
                            .room-item.active{border - color:#22c55e;background:#166534}
                            .room-name{font - weight:600;margin-bottom:4px}
                            .room-info{font - size:0.8rem;color:#94a3b8;display:flex;justify-content:space-between}
                            .room-users{display:flex;align-items:center;gap:4px}
                            .user-dot{width:8px;height:8px;border-radius:50%;background:#22c55e}
                            .hidden{display:none}
                            .tabs{display:flex;gap:8px;margin-bottom:16px}
                            .tab{flex:1;padding:10px;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:0.2s}
                            .tab.create{background:#22c55e;color:white}
                            .tab.join{background:#334155;color:#94a3b8}
                            .tab.active{background:#6366f1;color:white}
                            .section{display:none}
                            .section.active{display:block}
                        </style>
                    </head>
                    <body>
                        <button class="theme" id="th" onclick="toggleTheme()">🌙</button>

                        <div id="login">
                            <div class="card">
                                <h1>🗝️ WhisperVault</h1>
                                <p>Приватный чат • Сообщения исчезают в 00:00</p>

                                <div class="tabs">
                                    <button class="tab create active" onclick="switchTab('create')">➕ Создать</button>
                                    <button class="tab join" onclick="switchTab('join')">🚪 Присоединиться</button>
                                </div>

                                <!-- Создание комнаты -->
                                <div id="create-section" class="section active">
                                    <input id="nick-create" placeholder="Ваш ник">
                                        <input id="room-create" placeholder="Название комнаты">
                                            <input id="pass-create" type="password" placeholder="Пароль (мин. 6 символов)">
                                                <button class="btn btn-create" id="btn-create" onclick="createRoom()">🔐 Создать комнату</button>
                                                <button class="btn btn2" onclick="rnd()">🎲 Случайные данные</button>
                                            </div>

                                            <!-- Присоединение к комнате -->
                                            <div id="join-section" class="section">
                                                <input id="nick-join" placeholder="Ваш ник">
                                                    <input id="room-join" placeholder="Название комнаты" oninput="checkRoom()">
                                                        <input id="pass-join" type="password" placeholder="Пароль комнаты">
                                                            <button class="btn btn-join" id="btn-join" onclick="joinRoom()">🚪 Присоединиться</button>

                                                            <div class="rooms-list" id="rooms-list">
                                                                <p style="text-align:center;color:#94a3b8;font-size:0.85rem">Активные комнаты загружаются...</p>
                                                            </div>
                                                        </div>

                                                        <div class="err" id="err"></div>
                                                    </div>
                                            </div>

                                            <div id="chat">
                                                <div class="hdr">
                                                    <div>
                                                        <strong id="rn">Комната</strong>
                                                        <div style="font-size:0.8rem;color:#94a3b8" id="st">● Онлайн</div>
                                                    </div>
                                                    <div>
                                                        <button class="theme" onclick="copy()" style="position:relative;width:36px">🔗</button>
                                                        <button class="theme" onclick="out()" style="position:relative;margin-left:8px;color:#ef4444">✕</button>
                                                    </div>
                                                </div>
                                                <div class="msgs" id="msgs"><div class="sys">История очистится в 00:00</div></div>
                                                <div class="inp">
                                                    <input id="txt" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
                                                        <button class="send" onclick="send()">➤</button>
                                                </div>
                                            </div>

                                            <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
    // 🔥 ВСТАВЬТЕ СВОИ КЛЮЧИ СЮДА
    const firebaseConfig = {
  apiKey: "AIzaSyD6nlItCDyRcAXPrTdwEJX-Rdd8UdEdrLc",
  authDomain: "whispervault-b9917.firebaseapp.com",
  databaseURL: "https://whispervault-b9917-default-rtdb.firebaseio.com",
  projectId: "whispervault-b9917",
  storageBucket: "whispervault-b9917.firebasestorage.app",
  messagingSenderId: "776198299886",
  appId: "1:776198299886:web:078cbf6d8d64f76d4c13ff",
  measurementId: "G-VKHWR2B45D""
};
    firebase.initializeApp(firebaseConfig);
    const db=firebase.database(),auth=firebase.auth();
    let u,r,p,mr,roomsRef;

    auth.signInAnonymously().catch(console.error);

    // Переключение вкладок
    function switchTab(tab){
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    if(tab==='create'){
        document.querySelector('.tab.create').classList.add('active');
    document.getElementById('create-section').classList.add('active');
}else{
        document.querySelector('.tab.join').classList.add('active');
    document.getElementById('join-section').classList.add('active');
    loadRoomsList();
}
    document.getElementById('err').classList.remove('show');
}

    // Создание комнаты
    async function createRoom(){
const n=document.getElementById('nick-create').value.trim();
    const rm=document.getElementById('room-create').value.trim().toLowerCase();
    const pw=document.getElementById('pass-create').value;
    const e=document.getElementById('err');
    const b=document.getElementById('btn-create');
    if(n.length<2||rm.length<3||pw.length<6){e.textContent = '⚠️ Проверьте поля';e.classList.add('show');return;}
    e.classList.remove('show');b.disabled=true;b.textContent='...';
    try{
const ref=db.ref('rooms/'+rm);
    const s=await ref.once('value');
    if(s.val()) throw new Error('Комната уже существует');
    await ref.set({pass:await sha256(pw),lastReset:new Date().toDateString(),created:Date.now(),owner:n});
    u=n;r=rm;p=pw;
    sessionStorage.setItem('wv',JSON.stringify({n, r, p}));
    mr=db.ref('rooms/'+r+'/messages');
    setupPresence();
    document.getElementById('login').style.display='none';
    document.getElementById('chat').style.display='flex';
    document.getElementById('rn').textContent=r;
    load();
}catch(x){e.textContent = x.message;e.classList.add('show');}
    finally{b.disabled = false;b.textContent='🔐 Создать комнату';}
}

    // Присоединение к комнате
    async function joinRoom(){
const n=document.getElementById('nick-join').value.trim();
    const rm=document.getElementById('room-join').value.trim().toLowerCase();
    const pw=document.getElementById('pass-join').value;
    const e=document.getElementById('err');
    const b=document.getElementById('btn-join');
    if(n.length<2||rm.length<3||pw.length<6){e.textContent = '⚠️ Проверьте поля';e.classList.add('show');return;}
    e.classList.remove('show');b.disabled=true;b.textContent='...';
    try{
const ref=db.ref('rooms/'+rm);
    const s=await ref.once('value');
    const d=s.val();
    if(!d) throw new Error('Комната не найдена');
    if(d.pass!==await sha256(pw)) throw new Error('Неверный пароль');
    u=n;r=rm;p=pw;
    sessionStorage.setItem('wv',JSON.stringify({n, r, p}));
    mr=db.ref('rooms/'+r+'/messages');
    setupPresence();
    document.getElementById('login').style.display='none';
    document.getElementById('chat').style.display='flex';
    document.getElementById('rn').textContent=r;
    load();
}catch(x){e.textContent = x.message;e.classList.add('show');}
    finally{b.disabled = false;b.textContent='🚪 Присоединиться';}
}

    // Загрузка списка комнат
    function loadRoomsList(){
const list=document.getElementById('rooms-list');
    list.innerHTML='<p style="text-align:center;color:#94a3b8;font-size:0.85rem">Загрузка...</p>';

    roomsRef=db.ref('rooms');
roomsRef.on('value',snap=>{
const rooms=snap.val();
    if(!rooms){
        list.innerHTML = '<p style="text-align:center;color:#94a3b8;font-size:0.85rem">Нет активных комнат</p>';
    return;
}

    let html='';
Object.entries(rooms).forEach(([key,data])=>{
const users=data.users||{ };
    const userCount=Object.keys(users).length;
    const isSelected=key===document.getElementById('room-join').value.toLowerCase();
    html+=`<div class="room-item ${isSelected?'active':''}" onclick="selectRoom('${key}')">
        <div class="room-name">📁 ${escape(key)}</div>
        <div class="room-info">
            <span>Создатель: ${escape(data.owner || 'Аноним')}</span>
            <span class="room-users"><span class="user-dot"></span>${userCount} онлайн</span>
        </div>
    </div>`;
});

    list.innerHTML=html||'<p style="text-align:center;color:#94a3b8;font-size:0.85rem">Нет активных комнат</p>';
});
}

    // Выбор комнаты из списка
    function selectRoom(name){
        document.getElementById('room-join').value = name;
document.querySelectorAll('.room-item').forEach(item=>item.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

    // Проверка комнаты при вводе
    function checkRoom(){
const rm=document.getElementById('room-join').value.trim().toLowerCase();
document.querySelectorAll('.room-item').forEach(item=>{
        item.classList.toggle('active', item.querySelector('.room-name').textContent.includes(rm));
});
}

    // Отслеживание присутствия
    function setupPresence(){
if(!r)return;
    const uid=auth.currentUser?.uid||'anon';
    const userRef=db.ref('rooms/'+r+'/users/'+uid);
    userRef.set(true);
    userRef.onDisconnect().remove();
}

    function rnd(){
const i='r_'+Math.random().toString(36).slice(2,10);
    const w=Math.random().toString(36).slice(2,10);
    document.getElementById('room-create').value=i;
    document.getElementById('pass-create').value=w;
}

    function out(){
if(r){db.ref('rooms/' + r + '/users/' + (auth.currentUser?.uid || 'anon')).remove();}
    sessionStorage.removeItem('wv');
    location.reload();
}

    function send(){
const t=document.getElementById('txt').value.trim();
    if(!t||!mr)return;
    mr.push({nick:u,text:t,time:new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}),ts:firebase.database.ServerValue.TIMESTAMP});
    document.getElementById('txt').value='';
    document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
}

    function load(){
        mr.orderByChild('ts').limitToLast(50).on('child_added', s => {
            const m = s.val();
            const d = document.createElement('div');
            d.className = 'msg ' + (m.nick === u ? 'out' : 'in');
            d.innerHTML = '<div class="meta"><strong>' + esc(m.nick) + '</strong> ' + m.time + '</div>' + esc(m.text).replace(/\n/g, '<br>');
            document.getElementById('msgs').appendChild(d);
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
        });
}

    function esc(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
        async function sha256(m){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
        function copy(){navigator.clipboard.writeText('Комната: ' + r + '\nПароль: ' + p + '\nСсылка: ' + location.href).then(() => alert('✓ Скопировано!'));}
        function toggleTheme(){const c=document.body.style.background==='#f8fafc'?'#0f172a':'#f8fafc';document.body.style.background=c;document.body.style.color=c==='#0f172a'?'#f1f5f9':'#0f172a';document.getElementById('th').textContent=c==='#0f172a'?'🌙':'☀️';}

window.onload=()=>{
const s=sessionStorage.getItem('wv');
        if(s){const{n, r, p}=JSON.parse(s);document.getElementById('nick-create').value=n;document.getElementById('room-create').value=r;document.getElementById('pass-create').value=p;}
};
window.addEventListener('online',()=>document.getElementById('st').textContent='● Онлайн');
window.addEventListener('offline',()=>document.getElementById('st').textContent='○ Офлайн');
</script>
</body>
</html>
