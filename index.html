<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>WhisperVault</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui,sans-serif
        }

        body {
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 20px
        }

        .card {
            background: #1e293b;
            padding: 24px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            border: 1px solid #334155
        }

        h1 {
            text-align: center;
            margin-bottom: 8px
        }

        p {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 20px;
            font-size: 0.9rem
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #0b1120;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 1rem
        }

            input:focus {
                outline: none;
                border-color: #6366f1
            }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: #6366f1;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer
        }

            .btn:hover {
                background: #4f46e5
            }

            .btn:disabled {
                opacity: 0.6
            }

        .btn2 {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8
        }

            .btn2:hover {
                color: #f1f5f9;
                border-color: #6366f1
            }

        .err {
            color: #ef4444;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            background: rgba(239,68,68,0.1);
            border-radius: 10px;
            display: none
        }

            .err.show {
                display: block
            }

        .debug {
            background: #1e293b;
            border: 1px solid #f59e0b;
            border-radius: 10px;
            padding: 12px;
            margin-top: 16px;
            font-size: 0.85rem;
            color: #f59e0b
        }

        #chat {
            display: none;
            flex-direction: column;
            height: 100vh
        }

        .hdr {
            padding: 12px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between
        }

        .msgs {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 14px;
            word-wrap: break-word
        }

            .msg.in {
                align-self: flex-start;
                background: #334155
            }

            .msg.out {
                align-self: flex-end;
                background: #6366f1
            }

        .meta {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-bottom: 4px
        }

        .inp {
            padding: 12px;
            background: #1e293b;
            border-top: 1px solid #334155;
            display: flex;
            gap: 8px
        }

        #txt {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: 1px solid #334155;
            background: #0b1120;
            color: #f1f5f9
        }

        .send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #6366f1;
            border: none;
            color: white;
            cursor: pointer
        }
    </style>
</head>
<body>
    <!-- ЭКРАН ВХОДА -->
    <div id="login">
        <div class="card">
            <h1>🗝️ WhisperVault</h1>
            <p>Приватный чат • Сообщения исчезают в 00:00</p>

            <input id="nick" placeholder="Ваш ник (мин. 2 символа)">
            <input id="room" placeholder="Название комнаты (мин. 3 символа)">
            <input id="pass" type="password" placeholder="Пароль (мин. 6 символов)">

            <button class="btn" id="btn" onclick="login()">🚀 Войти / Создать</button>
            <button class="btn btn2" onclick="rnd()">🎲 Случайная комната</button>

            <div class="err" id="err"></div>

            <!-- ДИАГНОСТИКА -->
            <div class="debug" id="debug">
                <strong>🔍 Диагностика:</strong><br>
                <span id="debug-status">Загрузка...</span>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chat">
        <div class="hdr">
            <div>
                <strong id="rn">Комната</strong>
                <div style="font-size:0.8rem;color:#94a3b8" id="st">● Онлайн</div>
            </div>
            <div>
                <button class="btn" style="width:auto;padding:8px 16px;" onclick="copy()">🔗 Копировать</button>
                <button class="btn" style="width:auto;padding:8px 16px;background:#ef4444;" onclick="out()">✕ Выйти</button>
            </div>
        </div>
        <div class="msgs" id="msgs"><div style="text-align:center;color:#94a3b8;padding:20px;">История очистится в 00:00</div></div>
        <div class="inp">
            <input id="txt" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')send()">
            <button class="send" onclick="send()">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script>
        // 🔥 ВСТАВЬТЕ СВОИ КЛЮЧИ СЮДА
        const firebaseConfig = {
            apiKey: "AIzaSyD6nlItCDyRcAXPrTdwEJX-Rdd8UdEdrLc",
            authDomain: "whispervault-b9917.firebaseapp.com",
            databaseURL: "https://whispervault-b9917-default-rtdb.firebaseio.com",
            projectId: "whispervault-b9917",
            storageBucket: "whispervault-b9917.firebasestorage.app",
            messagingSenderId: "776198299886",
            appId: "1:776198299886:web:078cbf6d8d64f76d4c13ff",
            measurementId: "G-VKHWR2B45D"
        };

        // === ДИАГНОСТИКА ===
        const debug = document.getElementById('debug-status');
        let step = 0;

        function debugLog(msg) {
            step++;
            debug.innerHTML += `<br>✅ Шаг ${step}: ${msg}`;
            console.log('WhisperVault:', msg);
        }

        function debugError(msg) {
            debug.innerHTML += `<br>❌ Ошибка: ${msg}`;
            console.error('WhisperVault:', msg);
        }

        // Проверка ключей
        if (firebaseConfig.apiKey.includes('XXXXXXXX')) {
            debugError('Ключи Firebase не вставлены!');
            document.getElementById('err').textContent = '⚠️ Вставьте ключи Firebase в код (строка 75)';
            document.getElementById('err').classList.add('show');
        } else {
            debugLog('Ключи Firebase найдены');
        }

        // Инициализация Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            debugLog('Firebase инициализирован');
        } catch (e) {
            debugError('Firebase init: ' + e.message);
            document.getElementById('err').textContent = '❌ Ошибка Firebase: ' + e.message;
            document.getElementById('err').classList.add('show');
        }

        const db = firebase.database();
        const auth = firebase.auth();
        let u, r, p, mr;

        // Анонимная авторизация
        auth.signInAnonymously()
            .then(() => debugLog('Анонимный вход успешен'))
            .catch(e => {
                debugError('Auth: ' + e.message);
                document.getElementById('err').textContent = '❌ Ошибка входа: ' + e.message;
                document.getElementById('err').classList.add('show');
            });

        // Проверка подключения к базе
        db.ref('.info/connected').on('value', connected => {
            if (connected) {
                debugLog('Подключение к базе данных: ОК');
                document.getElementById('st').textContent = '● Онлайн';
            } else {
                debugError('Нет подключения к базе');
                document.getElementById('st').textContent = '○ Офлайн';
            }
        });

        // Вход / Создание
        async function login() {
            const n = document.getElementById('nick').value.trim();
            const rm = document.getElementById('room').value.trim().toLowerCase();
            const pw = document.getElementById('pass').value;
            const e = document.getElementById('err');
            const b = document.getElementById('btn');

            if (n.length < 2) { e.textContent = '⚠️ Ник мин. 2 символа'; e.classList.add('show'); return; }
            if (rm.length < 3) { e.textContent = '⚠️ Комната мин. 3 символа'; e.classList.add('show'); return; }
            if (pw.length < 6) { e.textContent = '⚠️ Пароль мин. 6 символов'; e.classList.add('show'); return; }

            e.classList.remove('show');
            b.disabled = true;
            b.textContent = 'Подключение...';
            debugLog('Попытка входа: комната=' + rm);

            try {
                const ref = db.ref('rooms/' + rm);
                const s = await ref.once('value');
                const d = s.val();

                if (d) {
                    debugLog('Комната найдена, проверка пароля...');
                    if (d.pass !== await sha256(pw)) throw new Error('Неверный пароль');
                } else {
                    debugLog('Комната не найдена, создаём новую...');
                    await ref.set({
                        pass: await sha256(pw),
                        lastReset: new Date().toDateString(),
                        created: Date.now(),
                        owner: n
                    });
                    debugLog('Комната создана!');
                }

                u = n; r = rm; p = pw;
                sessionStorage.setItem('wv', JSON.stringify({ n, r, p }));
                mr = db.ref('rooms/' + r + '/messages');

                debugLog('Вход успешен, переключаем экран...');
                document.getElementById('login').style.display = 'none';
                document.getElementById('chat').style.display = 'flex';
                document.getElementById('rn').textContent = r;

                load();
            } catch (x) {
                debugError('Login: ' + x.message);
                e.textContent = '❌ ' + x.message;
                e.classList.add('show');
            } finally {
                b.disabled = false;
                b.textContent = '🚀 Войти / Создать';
            }
        }

        function rnd() {
            const i = 'r_' + Math.random().toString(36).slice(2, 10);
            const w = Math.random().toString(36).slice(2, 10);
            document.getElementById('room').value = i;
            document.getElementById('pass').value = w;
            debugLog('Сгенерированы случайные данные');
        }

        function out() {
            sessionStorage.removeItem('wv');
            location.reload();
        }

        function send() {
            const t = document.getElementById('txt').value.trim();
            if (!t || !mr) return;
            mr.push({
                nick: u,
                text: t,
                time: new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }),
                ts: firebase.database.ServerValue.TIMESTAMP
            });
            document.getElementById('txt').value = '';
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
        }

        function load() {
            debugLog('Загрузка сообщений...');
            mr.orderByChild('ts').limitToLast(50).on('child_added', s => {
                const m = s.val();
                const d = document.createElement('div');
                d.className = 'msg ' + (m.nick === u ? 'out' : 'in');
                d.innerHTML = '<div class="meta"><strong>' + esc(m.nick) + '</strong> ' + m.time + '</div>' + esc(m.text).replace(/\n/g, '<br>');
                document.getElementById('msgs').appendChild(d);
                document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
            });
        }

        function esc(s) {
            return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        async function sha256(m) {
            const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(m));
            return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, '0')).join('');
        }

        function copy() {
            navigator.clipboard.writeText('Комната: ' + r + '\nПароль: ' + p + '\nСсылка: ' + location.href)
                .then(() => alert('✓ Скопировано!'));
        }

        // Восстановление сессии
        window.onload = () => {
            debugLog('Страница загружена');
            const s = sessionStorage.getItem('wv');
            if (s) {
                const { n, r, p } = JSON.parse(s);
                document.getElementById('nick').value = n;
                document.getElementById('room').value = r;
                document.getElementById('pass').value = p;
                debugLog('Сессия восстановлена');
            }
        };

        window.addEventListener('online', () => document.getElementById('st').textContent = '● Онлайн');
        window.addEventListener('offline', () => document.getElementById('st').textContent = '○ Офлайн');
    </script>
</body>
</html>
