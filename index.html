<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Переключить тему" title="Тёмная/светлая тема">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <div id="login-screen">
        <div class="login-card">
            <div class="brand">
                <div class="brand-logo">🗝️</div>
                <h1 class="brand-title">WhisperVault</h1>
                <p class="brand-tagline">Приватные комнаты • Исчезающие сообщения • Без логов</p>
            </div>
            
            <form id="login-form" onsubmit="attemptLogin(event)">
                <div class="input-group">
                    <label class="input-label" for="nickname"><span>Ваш никнейм</span><span class="input-hint">2-15 символов</span></label>
                    <div class="input-wrapper">
                        <input type="text" id="nickname" class="input-field" placeholder="Например: Luna" maxlength="15" autocomplete="off" required pattern="^[\wа-яА-ЯёЁ\-]{2,15}$">
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label" for="room-id"><span>ID комнаты</span><span class="input-hint">3-30 символов</span></label>
                    <div class="input-wrapper">
                        <input type="text" id="room-id" class="input-field" placeholder="Придумайте название" maxlength="30" autocomplete="off" required pattern="^[\w\-]{3,30}$">
                        <div class="input-actions">
                            <button type="button" class="input-action-btn" onclick="generateRoom()" title="Сгенерировать случайную комнату" aria-label="Сгенерировать комнату">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M16 8h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label" for="room-pass"><span>Пароль доступа</span><span class="input-hint">Минимум 6 символов</span></label>
                    <div class="input-wrapper">
                        <input type="password" id="room-pass" class="input-field" placeholder="••••••••" maxlength="50" autocomplete="new-password" required minlength="6">
                        <div class="input-actions">
                            <button type="button" class="input-action-btn toggle-pass" title="Показать/скрыть пароль" aria-label="Показать пароль">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-open"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-closed" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn"><span>🚀</span><span>Войти / Создать комнату</span></button>
                <button type="button" class="btn btn-secondary" onclick="generateRoom()"><span>🎲</span><span>Случайная комната</span></button>
            </form>
            <div id="login-error" class="error-msg" role="alert"></div>
            <div id="login-loading" class="loading"><div class="loading-spinner"></div><span>Подключение к безопасному каналу...</span></div>
            <div class="security-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>End-to-end шифрование • Нет логов • Авто-очистка</span></div>
        </div>
    </div>

    <div id="chat-screen">
        <header class="chat-header">
            <div class="room-info">
                <div class="room-avatar" id="room-avatar">WV</div>
                <div class="room-details">
                    <div class="room-name" id="header-room-name">Комната</div>
                    <div class="room-meta"><span class="online-dot" id="connection-status"></span><span id="header-status">Подключено</span><span id="member-count" style="display:none">• <span id="members">0</span> онлайн</span></div>

            </div>

    <script>
        // ⚠️ ЗАМЕНИТЕ НА СВОИ КЛЮЧИ FIREBASE
        const firebaseConfig = {

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), storage = firebase.storage(), auth = firebase.auth();
        let state = { user:null, room:null, password:null, messagesRef:null, roomRef:null, typingRef:null, typingTimeout:null, mediaRecorder:null, audioChunks:[], isRecording:false, midnightTimer:null, lastMessageTime:0, rateLimit:{count:0, resetTime:0} };

        document.addEventListener('DOMContentLoaded', async () => {
            initTheme(); setupMouseGlow(); setupInputHandlers(); setupFilePreview(); setupKeyboardShortcuts();

        function initTheme() { const saved = localStorage.getItem('whisper_theme'), prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches, theme = saved || (prefersDark ? 'dark' : 'light'); document.documentElement.setAttribute('data-theme', theme); updateThemeIcon(); }
        function toggleTheme() { const current = document.documentElement.getAttribute('data-theme'), next = current === 'dark' ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', next); localStorage.setItem('whisper_theme', next); updateThemeIcon(); showToast('Тема изменена', 'success'); }
        function updateThemeIcon() { const theme = document.documentElement.getAttribute('data-theme'), svg = document.querySelector('#theme-toggle svg'); svg.innerHTML = theme === 'dark' ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>' : '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>'; }
        function setupMouseGlow() { document.body.addEventListener('mousemove', e => { document.body.style.setProperty('--mouse-x', e.clientX+'px'); document.body.style.setProperty('--mouse-y', e.clientY+'px'); }); }
        function setupInputHandlers() {
            const input = document.getElementById('message-input'), sendBtn = document.getElementById('send-btn');
            input.addEventListener('input', () => { input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,120)+'px'; sendBtn.disabled=!input.value.trim(); broadcastTyping(); });
            input.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); if(!sendBtn.disabled) sendMessage(); } });
            ['nickname','room-id','room-pass'].forEach(id => { const el=document.getElementById(id); el.addEventListener('blur',()=>validateField(el)); });
            document.querySelectorAll('.toggle-pass').forEach(btn => { btn.addEventListener('click', function() { const passInput=this.closest('.input-wrapper').querySelector('input'), isPass=passInput.type==='password'; passInput.type=isPass?'text':'password'; this.querySelector('.eye-open').style.display=isPass?'none':'block'; this.querySelector('.eye-closed').style.display=isPass?'block':'none'; }); });
        }
        function validateField(field) { const patterns={'nickname':/^[\wа-яА-ЯёЁ\-]{2,15}$/,'room-id':/^[\w\-]{3,30}$/,'room-pass':/^.{6,}$/}, pattern=patterns[field.id]; if(pattern&&!pattern.test(field.value)){ field.style.borderColor='var(--danger)'; return false; } field.style.borderColor=''; return true; }
        function setupFilePreview() {
            const fileInput=document.getElementById('file-input'), preview=document.createElement('div'); preview.className='file-preview'; preview.id='file-preview'; preview.innerHTML='<img class="file-preview-img" id="preview-img"><div class="file-preview-info"><div class="file-preview-name" id="preview-name"></div><div class="file-preview-size" id="preview-size"></div></div><button class="file-preview-remove" id="preview-remove" aria-label="Удалить файл">✕</button>';
            document.querySelector('.chat-input-area').insertBefore(preview, fileInput);
            fileInput.addEventListener('change', async e => { const file=e.target.files[0]; if(!file) return; if(!file.type.startsWith('image/')){ showToast('Только изображения','warning'); fileInput.value=''; return; } if(file.size>5*1024*1024){ showToast('Максимум 5 МБ','warning'); fileInput.value=''; return; } const reader=new FileReader(); reader.onload=ev => { document.getElementById('preview-img').src=ev.target.result; document.getElementById('preview-name').textContent=file.name; document.getElementById('preview-size').textContent=formatBytes(file.size); document.getElementById('file-preview').classList.add('show'); }; reader.readAsDataURL(file); });
            document.getElementById('preview-remove').addEventListener('click', () => { fileInput.value=''; document.getElementById('file-preview').classList.remove('show'); });
        }
        function setupKeyboardShortcuts() { document.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey)&&e.key==='Enter'&&state.room){ e.preventDefault(); sendMessage(); } if(e.key==='Escape'){ if(state.isRecording) stopRecording(); document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show')); } if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){ e.preventDefault(); document.getElementById('message-input')?.focus(); } }); }

        async function attemptLogin(e) { e?.preventDefault(); const nick=document.getElementById('nickname').value.trim(), room=document.getElementById('room-id').value.trim().toLowerCase(), pass=document.getElementById('room-pass').value; if(!validateField(document.getElementById('nickname'))||!validateField(document.getElementById('room-id'))||!validateField(document.getElementById('room-pass'))){ showError('Проверьте правильность заполнения полей'); return; } setLoading(true); try { const roomKey=`rooms/${room}`, snapshot=await db.ref(roomKey).once('value'), roomData=snapshot.val(); if(roomData){ if(roomData.passwordHash!==await sha256(pass)) throw new Error('Неверный пароль'); await checkDailyReset(roomKey, roomData); } else { await db.ref(roomKey).set({ passwordHash:await sha256(pass), createdAt:firebase.database.ServerValue.TIMESTAMP, lastReset:new Date().toDateString(), settings:{ maxMessageLength:2000, maxFileSize:5*1024*1024, autoDeleteHours:24 } }); } state.user=nick; state.room=room; state.password=pass; saveSession(); setupRoomListeners(); switchToChat(); showToast(`Добро пожаловать, ${nick}!`, 'success'); } catch(error){ console.error('Login error:', error); showError(error.message==='Неверный пароль'?'🔒 Неверный пароль':'❌ '+error.message); } finally { setLoading(false); } }
        function generateRoom() { const id='vault_'+Math.random().toString(36).slice(2,10), pass=Array(12).fill(0).map(()=> 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*'[Math.floor(Math.random()*70)]).join(''); document.getElementById('room-id').value=id; document.getElementById('room-pass').value=pass; navigator.clipboard?.writeText(pass).then(()=> showToast('Пароль скопирован в буфер','success')); }
        function switchToChat() { document.getElementById('login-screen').classList.add('hidden'); const chat=document.getElementById('chat-screen'); chat.classList.add('active'); chat.style.display='flex'; document.getElementById('header-room-name').textContent=state.room; document.getElementById('room-avatar').textContent=state.room.slice(0,2).toUpperCase(); loadMessages(); scrollToBottom(); }
        function confirmLogout() { if(confirm('Выйти из комнаты? Непрочитанные сообщения будут потеряны.')) logout(); }
        function logout() { cleanupListeners(); sessionStorage.removeItem('whisper_session'); location.reload(); }

        async function sendMessage(type='text', content=null, meta={}) { const now=Date.now(); if(now-state.rateLimit.resetTime>10000) state.rateLimit={count:0, resetTime:now}; if(++state.rateLimit.count>5){ showToast('Подождите перед отправкой','warning'); return; } const input=document.getElementById('message-input'), sendBtn=document.getElementById('send-btn'); if(type==='text'&&!content){ content=input.value.trim(); if(!content) return; } sendBtn.disabled=true; const message={ id:crypto.randomUUID(), uid:auth.currentUser?.uid||'anon', nick:sanitize(state.user), type, content:type==='text'?sanitize(content):content, timestamp:firebase.database.ServerValue.TIMESTAMP, time:new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}), reactions:{}, ...meta }; try { await state.messagesRef.push(message); if(type==='text'){ input.value=''; input.style.height='auto'; } scrollToBottom(); stopTyping(); } catch(err){ console.error('Send error:',err); showToast('Не удалось отправить','error'); } finally { sendBtn.disabled=false; } }
        function loadMessages() { if(!state.messagesRef) return; state.messagesRef.off(); state.messagesRef.orderByChild('timestamp').limitToLast(100).on('child_added', snap => { const msg=snap.val(); renderMessage(msg, snap.key); scrollToBottom(); }); state.messagesRef.on('child_removed', snap => { document.querySelector(`[data-msg-id="${snap.key}"]`)?.remove(); }); setupTypingListener(); }
        function renderMessage(msg, msgId) { const container=document.getElementById('messages-container'); container.querySelector('.empty-state')?.remove(); const isMe=msg.nick===state.user, div=document.createElement('article'); div.className=`message ${isMe?'outgoing':'incoming'}`; div.dataset.msgId=msgId; div.setAttribute('role','article'); let contentHtml=''; switch(msg.type){ case'text': contentHtml=`<div class="message-content">${escapeHtml(msg.content).replace(/\n/g,'<br>')}</div>`; break; case'image': contentHtml=`<div class="message-content">${msg.caption?`<p style="margin-bottom:6px">${escapeHtml(msg.caption)}</p>`:''}<img src="${msg.content}" alt="Изображение" loading="lazy" onclick="openImageModal('${msg.content}')" style="cursor:pointer"></div>`; break; case'audio': contentHtml=`<div class="message-content"><audio controls src="${msg.content}" preload="metadata" style="width:100%;max-width:280px"></audio>${msg.duration?`<small style="opacity:0.8">🎵 ${formatDuration(msg.duration)}</small>`:''}</div>`; break; } const reactionsHtml=Object.entries(msg.reactions||{}).map(([emoji,users])=>`<button class="reaction-btn ${users.includes(auth.currentUser?.uid)?'active':''}" onclick="toggleReaction('${msgId}','${emoji}')">${emoji} <span class="reaction-count">${users.length}</span></button>`).join(''); div.innerHTML=`<header class="message-header"><span class="message-nick">${escapeHtml(msg.nick)}</span><time class="message-time" datetime="${new Date(msg.timestamp).toISOString()}">${msg.time}</time></header>${contentHtml}${reactionsHtml?`<div class="message-reactions">${reactionsHtml}</div>`:''}${isMe?`<div class="message-menu"><button class="message-menu-btn" onclick="deleteMessage('${msgId}')" title="Удалить">🗑️</button></div>`:''}`; container.appendChild(div); }
        function toggleReaction(msgId, emoji) { const uid=auth.currentUser?.uid; if(!uid) return; state.messagesRef.child(msgId).transaction(msg => { if(!msg) return; const users=msg.reactions?.[emoji]||[], idx=users.indexOf(uid); if(idx>-1) users.splice(idx,1); else users.push(uid); return {...msg, reactions:{...msg.reactions, [emoji]:users}}; }); }
        async function deleteMessage(msgId) { if(!confirm('Удалить это сообщение?')) return; try { await state.messagesRef.child(msgId).remove(); showToast('Сообщение удалено','success'); } catch { showToast('Не удалось удалить','error'); } }
        function broadcastTyping() { if(!state.typingRef) return; state.typingRef.child(state.user).set({ at:firebase.database.ServerValue.TIMESTAMP }); clearTimeout(state.typingTimeout); state.typingTimeout=setTimeout(stopTyping,3000); }
        function stopTyping() { state.typingRef?.child(state.user)?.remove(); }
        function setupTypingListener() { state.typingRef=db.ref(`rooms/${state.room}/typing`); state.typingRef.on('value', snap => { const typers=Object.keys(snap.val()||{}).filter(u=>u!==state.user), indicator=document.getElementById('typing-indicator'), userEl=document.getElementById('typing-user'); if(typers.length>0){ userEl.textContent=typers.slice(0,2).join(', ')+(typers.length>2?` и ещё ${typers.length-2}`:''); indicator.classList.add('show'); } else { indicator.classList.remove('show'); } }); }
        async function handleImageUpload(file) { if(!file?.type?.startsWith('image/')) return; if(file.size>5*1024*1024){ showToast('Файл слишком большой (макс 5 МБ)','warning'); return; } const progressEl=document.getElementById('image-progress'), attachBtn=document.getElementById('attach-btn'); attachBtn.disabled=true; progressEl.style.width='0%'; try { const compressed=await compressImage(file), storageRef=storage.ref(`rooms/${state.room}/images/${Date.now()}_${compressed.name}`); await new Promise((resolve,reject)=>{ const task=storageRef.put(compressed); task.on('state_changed', snap=>{ const pct=(snap.bytesTransferred/snap.totalBytes)*100; progressEl.style.width=`${pct}%`; }, reject, resolve); }); const url=await storageRef.getDownloadURL(); await sendMessage('image',url,{ caption:'', originalName:file.name, size:file.size }); document.getElementById('file-input').value=''; document.getElementById('file-preview').classList.remove('show'); progressEl.style.width='0%'; } catch(err){ console.error('Upload error:',err); showToast('Ошибка загрузки','error'); } finally { attachBtn.disabled=false; } }
        function compressImage(file) { return new Promise(resolve => { const img=new Image(), canvas=document.createElement('canvas'), ctx=canvas.getContext('2d'); img.onload=()=>{ const max=1920; let {width,height}=img; if(width>max||height>max){ const ratio=Math.min(max/width, max/height); width*=ratio; height*=ratio; } canvas.width=width; canvas.height=height; ctx.drawImage(img,0,0,width,height); canvas.toBlob(blob=>resolve(new File([blob],file.name.replace(/\.\w+$/,'.jpg'),{type:'image/jpeg'})), 'image/jpeg', 0.85); }; img.src=URL.createObjectURL(file); }); }
        async function startRecording(e) { e?.preventDefault(); if(state.isRecording) return; try { const stream=await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:true, noiseSuppression:true, sampleRate:16000 } }), mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm'; state.mediaRecorder=new MediaRecorder(stream,{mimeType}); state.audioChunks=[]; let startTime=Date.now(); state.mediaRecorder.ondataavailable=ev=>{ if(ev.data.size>0) state.audioChunks.push(ev.data); }; state.mediaRecorder.onstop=async()=>{ const duration=(Date.now()-startTime)/1000; if(duration<0.5){ showToast('Слишком короткая запись','warning'); stream.getTracks().forEach(t=>t.stop()); return; } const blob=new Blob(state.audioChunks,{type:mimeType}); if(blob.size>2*1024*1024){ showToast('Голосовое слишком большое (макс 2 МБ)','warning'); stream.getTracks().forEach(t=>t.stop()); return; } const storageRef=storage.ref(`rooms/${state.room}/audio/${Date.now()}.${mimeType.split(';')[0].split('/')[1]}`); await storageRef.put(blob); const url=await storageRef.getDownloadURL(); await sendMessage('audio',url,{duration:Math.round(duration),mimeType}); stream.getTracks().forEach(t=>t.stop()); showToast('Голосовое отправлено','success'); }; state.mediaRecorder.start(1000); state.isRecording=true; document.getElementById('mic-btn').classList.add('recording'); if(navigator.vibrate) navigator.vibrate(50); } catch(err){ console.error('Mic error:',err); if(err.name==='NotAllowedError') showToast('Разрешите доступ к микрофону','warning'); else showToast('Ошибка записи','error'); } }
        function stopRecording() { if(!state.isRecording||state.mediaRecorder?.state==='inactive') return; state.mediaRecorder.stop(); state.isRecording=false; document.getElementById('mic-btn').classList.remove('recording'); if(navigator.vibrate) navigator.vibrate([50,50,50]); }
        async function copyInvite() { const origin=window.location.origin+window.location.pathname, text=`🗝️ WhisperVault\n\n🔐 Комната: ${state.room}\n🔑 Пароль: ${state.password}\n\n🔗 ${origin}?room=${state.room}`; try { await navigator.clipboard.writeText(text); showToast('Приглашение скопировано!','success'); } catch { const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('Приглашение скопировано!','success'); } }
        function openImageModal(src) { document.getElementById('modal-image').src=src; document.getElementById('image-modal').classList.add('show'); }
        function closeImageModal(e) { if(e.target.id==='image-modal') document.getElementById('image-modal').classList.remove('show'); }

        function showError(msg) { const el=document.getElementById('login-error'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),5000); }
        function setLoading(loading) { document.getElementById('login-loading').classList.toggle('show',loading); document.getElementById('login-btn').disabled=loading; }
        function setupConnectionStatus() { const dot=document.getElementById('connection-status'), status=document.getElementById('header-status'); function update(isOnline){ dot.classList.toggle('offline',!isOnline); status.textContent=isOnline?'Подключено':'Офлайн'; if(!isOnline) showToast('Потеряно соединение','warning'); } update(navigator.onLine); window.addEventListener('online',()=>update(true)); window.addEventListener('offline',()=>update(false)); }
        function scheduleMidnightCheck() { const now=new Date(), nextMidnight=new Date(now); nextMidnight.setDate(nextMidnight.getDate()+1); nextMidnight.setHours(0,0,0,0); const msUntil=nextMidnight-now; state.midnightTimer=setTimeout(checkAndResetMidnight, msUntil); }
        async function checkAndResetMidnight() { if(!state.room) return; const today=new Date().toDateString(); try { const snap=await db.ref(`rooms/${state.room}`).once('value'), data=snap.val(); if(data?.lastReset!==today){ await db.ref(`rooms/${state.room}/messages`).remove(); await db.ref(`rooms/${state.room}`).update({lastReset:today}); addSystemMessage('🧹 История очищена (00:00)'); showToast('Чат очищен','info'); } } catch(e){ console.error('Reset error:',e); } scheduleMidnightCheck(); }
        function addSystemMessage(text) { const container=document.getElementById('messages-container'); container.querySelector('.empty-state')?.remove(); const div=document.createElement('div'); div.className='message system'; div.textContent=text; container.appendChild(div); scrollToBottom(); }
        function saveSession() { sessionStorage.setItem('whisper_session', JSON.stringify({ nick:state.user, room:state.room, pass:state.password })); }
        function restoreSession() { const saved=sessionStorage.getItem('whisper_session'); if(saved){ const {nick,room,pass}=JSON.parse(saved); document.getElementById('nickname').value=nick||''; document.getElementById('room-id').value=room||''; document.getElementById('room-pass').value=pass||''; } }
        function sanitize(str) { const div=document.createElement('div'); div.textContent=str; return div.innerHTML; }
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
        function formatBytes(bytes) { if(!bytes) return '0 Б'; const k=1024, sizes=['Б','КБ','МБ','ГБ'], i=Math.floor(Math.log(bytes)/Math.log(k)); return parseFloat((bytes/Math.pow(k,i)).toFixed(1))+' '+sizes[i]; }
        function formatDuration(sec) { if(sec<60) return `${Math.round(sec)}с`; const m=Math.floor(sec/60), s=Math.round(sec%60); return `${m}:${s.toString().padStart(2,'0')}`; }
        function scrollToBottom() { const el=document.getElementById('messages-container'); el.scrollTo({top:el.scrollHeight, behavior:'smooth'}); }
        function cleanupListeners() { state.messagesRef?.off(); state.typingRef?.off(); if(state.midnightTimer) clearTimeout(state.midnightTimer); }
        async function sha256(message) { const msgBuffer=new TextEncoder().encode(message), hashBuffer=await crypto.subtle.digest('SHA-256', msgBuffer); return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
        function setupRoomListeners() { state.messagesRef=db.ref(`rooms/${state.room}/messages`); state.roomRef=db.ref(`rooms/${state.room}`); }
        async function checkDailyReset(roomKey, roomData) { const today=new Date().toDateString(); if(roomData.lastReset!==today){ await db.ref(`${roomKey}/messages`).remove(); await db.ref(roomKey).update({lastReset:today}); } }
        window.addEventListener('beforeunload', e => { if(state.room){ e.preventDefault(); e.returnValue=''; } });
        document.getElementById('file-input').addEventListener('change', e => handleImageUpload(e.target.files[0]));
        document.getElementById('emoji-btn').addEventListener('click', () => { const emojis=['😀','😂','😍','🤔','😎','🎉','🔥','💯','👍','❤️'], input=document.getElementById('message-input'); input.value+=emojis[Math.floor(Math.random()*emojis.length)]; input.dispatchEvent(new Event('input')); input.focus(); });
    </script>
</body>
</html>
